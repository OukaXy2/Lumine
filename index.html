  </style></head>
<body><!-- Floating Draggable Container --><div id="viewerDrag" class="viewer-drag">

    <div class="glass-strong border border-white/70 shadow-soft rounded-[2.25rem] px-2 py-2 flex items-center justify-between">

      <button data-nav="motions" class="flex-1 flex flex-col items-center py-2 rounded-[1.5rem] text-muted"><span class="material-symbols-outlined">animation</span><span class="text-[0.65rem] font-bold">Motions</span></button>
      <button data-nav="mood" class="flex-1 flex flex-col items-center py-2 rounded-[1.5rem] text-muted"><span class="material-symbols-outlined">auto_awesome</span><span class="text-[0.65rem] font-bold">Mood</span></button>
      <button data-nav="config" class="flex-1 flex flex-col items-center py-2 rounded-[1.5rem] text-muted"><span class="material-symbols-outlined">settings</span><span class="text-[0.65rem] font-bold">Config</span></button>

</div><!-- Modal --><div id="modalContainer" class="modal hidden pointer-events-auto"></div><script>
  // ======================== GLOBAL VARIABLES ========================
  let app, model;
  let isMicActive = false;
  let audioContext = null, mediaStream = null, sourceNode = null, analyserNode = null;
  let currentVolume = 0;
  let targetAngleX = 0, targetAngleY = 0, currentAngleX = 0, currentAngleY = 0;
  let breathTime = 0;
  let blinkInterval = null;
  let db = null;
  let modelLoaded = false;
  let currentModelData = null;
  let currentModelObjectUrls = [];

  let config = {
    micSensitivity: 3.5,
    blinkIntervalMs: 3500,
    mouseFollow: true,
    breathStrength: 0.2
  };

  let motionList = [];
  let currentMotion = null;

  const expressionParams = {
    none: { reset: true },
    angry: { ParamEX06: 1, ParamEX12: 1 },
    sad: { ParamEX07: 1, ParamEX10: 0.5 },
    heart: { ParamEX08: 1, ParamEX09: 0.8 },
    blush: { ParamEX11: 1 }
  };

  // ======================== INDEXEDDB HELPERS ========================
  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open("Live2DModelDB", 2);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("files")) db.createObjectStore("files", { keyPath: "path" });
        if (!db.objectStoreNames.contains("metadata")) db.createObjectStore("metadata", { keyPath: "key" });
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function saveFileToDB(path, blob) {
    if (!db) db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("files", "readwrite");
      const store = tx.objectStore("files");
      const req = store.put({ path: path, data: blob, type: blob.type, updated: Date.now() });
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async function getFileFromDB(path) {
    if (!db) db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("files", "readonly");
      const store = tx.objectStore("files");
      const req = store.get(path);
      req.onsuccess = () => resolve(req.result ? req.result.data : null);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async function getAllFilesFromDB() {
    if (!db) db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("files", "readonly");
      const store = tx.objectStore("files");
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async function saveMetadata(key, value) {
    if (!db) db = await openDB();
    const tx = db.transaction("metadata", "readwrite");
    const store = tx.objectStore("metadata");
    store.put({ key: key, value: value });
    return new Promise(r => tx.oncomplete = r);
  }

  async function getMetadata(key) {
    if (!db) db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction("metadata", "readonly");
      const store = tx.objectStore("metadata");
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result ? req.result.value : null);
    });
  }

  function revokeObjectUrls() {
    for (const url of currentModelObjectUrls) {
      try { URL.revokeObjectURL(url); } catch (_) {}
    }
    currentModelObjectUrls = [];
  }

  async function fileExistsInDB(path) {
    const file = await getFileFromDB(path);
    return !!file;
  }

  async function pathToObjectUrl(path) {
    const blob = await getFileFromDB(path);
    if (!blob) return null;
    const url = URL.createObjectURL(blob);
    currentModelObjectUrls.push(url);
    return url;
  }

  async function convertFileReferencesRecursive(node) {
    if (Array.isArray(node)) {
      const result = [];
      for (const item of node) result.push(await convertFileReferencesRecursive(item));
      return result;
    }

    if (node && typeof node === 'object') {
      const result = {};
      for (const [key, value] of Object.entries(node)) {
        result[key] = await convertFileReferencesRecursive(value);
      }
      return result;
    }

    if (typeof node === 'string') {
      if (node.startsWith('http:') || node.startsWith('https:') || node.startsWith('blob:') || node.startsWith('data:')) {
        return node;
      }
      const blob = await getFileFromDB(node);
      if (blob) {
        const url = URL.createObjectURL(blob);
        currentModelObjectUrls.push(url);
        return url;
      }
    }

    return node;
  }

  // ======================== UPLOAD MODEL FOLDER ========================
  async function uploadModelFolder() {
    return new Promise((resolve, reject) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.webkitdirectory = true;
      input.multiple = true;
      input.onchange = async (e) => {
        const files = Array.from(e.target.files || []);
        const fileMap = new Map();

        if (!files.length) {
          reject(new Error('Tidak ada file dipilih'));
          return;
        }

        for (const file of files) {
          const pathParts = file.webkitRelativePath.split('/');
          const relativePath = pathParts.slice(1).join('/');
          const blob = file.slice(0, file.size, file.type);
          await saveFileToDB(relativePath, blob);
          fileMap.set(relativePath, blob);
        }

        let modelJsonPath = null;
        for (const path of fileMap.keys()) {
          if (path.endsWith('.model3.json')) {
            modelJsonPath = path;
            break;
          }
        }

        if (modelJsonPath) {
          await saveMetadata('currentModelPath', modelJsonPath);
          await saveMetadata('modelFolderUploaded', true);
          resolve(modelJsonPath);
        } else {
          reject(new Error('Tidak ditemukan file .model3.json'));
        }
      };
      input.click();
    });
  }

  // ======================== LOAD MODEL DARI INDEXEDDB ========================
  async function loadModelFromDB(modelJsonPath) {
    try {
      if (model) {
        app.stage.removeChild(model);
        model.destroy({ children: true, texture: true, baseTexture: true });
        model = null;
      }
      revokeObjectUrls();

      const modelJsonBlob = await getFileFromDB(modelJsonPath);
      if (!modelJsonBlob) throw new Error('Model JSON tidak ditemukan');

      const modelJsonText = await modelJsonBlob.text();
      const modelData = JSON.parse(modelJsonText);
      currentModelData = modelData;

      if (modelData.FileReferences) {
        modelData.FileReferences = await convertFileReferencesRecursive(modelData.FileReferences);
      }

      model = await PIXI.live2d.Live2DModel.from(modelData);
      model.x = 225;
      model.y = 275;
      model.anchor.set(0.5, 0.5);
      model.scale.set(0.28);
      app.stage.addChild(model);
      modelLoaded = true;

      const allFiles = await getAllFilesFromDB();
      motionList = allFiles
        .filter(file => file.path.endsWith('.motion3.json') && !file.path.includes('idle'))
        .map(file => file.path);

      const idlePath = 'motion/idle.motion3.json';
      const idleBlob = await getFileFromDB(idlePath);
      if (idleBlob) {
        console.warn('Idle motion ditemukan, tetapi playback akan bergantung pada API Live2D yang tersedia.');
      }

      return true;
    } catch (e) {
      console.error(e);
      modelLoaded = false;
      return false;
    }
  }

  // ======================== PARAMETER CONTROL ========================
  function setParameter(name, value, clamp = true) {
    if (!model?.internalModel) return;
    if (clamp) value = Math.min(1, Math.max(0, value));

    try {
      const coreModel = model.internalModel.coreModel;
      if (coreModel?.setParameterValueById) {
        coreModel.setParameterValueById(name, value);
        return;
      }
      if (coreModel?.setParameterValue) {
        coreModel.setParameterValue(name, value);
        return;
      }
      if (model.internalModel.setParameterValue) {
        model.internalModel.setParameterValue(name, value);
      }
    } catch (e) {
      console.warn('Failed setting parameter', name, e);
    }
  }

  function resetAllExpressionParams() {
    for (let param in expressionParams) {
      if (param !== 'none') {
        for (let p in expressionParams[param]) {
          setParameter(p, 0, true);
        }
      }
    }

    setParameter('ParamEX01', 0);
    setParameter('ParamEX02', 0);
    setParameter('ParamEX03', 0);
    setParameter('ParamEX04', 0);
    setParameter('ParamEX05', 0);
    setParameter('ParamEX06', 0);
    setParameter('ParamEX07', 0);
    setParameter('ParamEX08', 0);
    setParameter('ParamEX09', 0);
    setParameter('ParamEX10', 0);
    setParameter('ParamEX11', 0);
    setParameter('ParamEX12', 0);
  }

  function setExpression(exprName) {
    if (!model) return;
    resetAllExpressionParams();
    if (exprName !== 'none') {
      const params = expressionParams[exprName];
      if (params) {
        for (let [p, val] of Object.entries(params)) {
          setParameter(p, val, true);
        }
      }
    }
  }

  async function playMotion(motionPath) {
    if (!model) return;
    try {
      const motionBlob = await getFileFromDB(motionPath);
      if (!motionBlob) return;
      const motionUrl = URL.createObjectURL(motionBlob);
      currentModelObjectUrls.push(motionUrl);

      if (typeof model.motion === 'function') {
        await model.motion(motionUrl);
        return;
      }

      if (model.internalModel?.motionManager?.startMotion) {
        model.internalModel.motionManager.startMotion(motionUrl, 0, 0);
        return;
      }

      console.warn('Motion API tidak tersedia pada versi Live2D yang dipakai.');
    } catch (e) {
      console.warn('Gagal memainkan motion:', e);
    }
  }

  // ======================== MICROPHONE ========================
  async function initMicrophone() {
    if (audioContext) await closeMicrophone();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaStream = stream;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 256;
      sourceNode = audioContext.createMediaStreamSource(stream);
      sourceNode.connect(analyserNode);
      await audioContext.resume();
      isMicActive = true;
      document.getElementById('micBtn').classList.add('bg-red-100');
    } catch (e) {
      console.error(e);
      alert('Mic tidak diizinkan');
    }
  }

  async function closeMicrophone() {
    if (sourceNode) sourceNode.disconnect();
    if (analyserNode) analyserNode.disconnect();
    if (audioContext) await audioContext.close();
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    audioContext = null;
    mediaStream = null;
    sourceNode = null;
    analyserNode = null;
    isMicActive = false;
    document.getElementById('micBtn').classList.remove('bg-red-100');
  }

  // ======================== ANIMATION LOOP ========================
  function startAnimationLoop() {
    function animate() {
      if (!model) {
        requestAnimationFrame(animate);
        return;
      }

      breathTime += 0.025;
      setParameter('ParamBreath', 0.5 + Math.sin(breathTime) * config.breathStrength);

      if (config.mouseFollow) {
        currentAngleX += (targetAngleX - currentAngleX) * 0.12;
        currentAngleY += (targetAngleY - currentAngleY) * 0.12;
        setParameter('ParamAngleX', currentAngleX, false);
        setParameter('ParamAngleY', currentAngleY, false);
      }

      if (isMicActive && analyserNode) {
        const data = new Uint8Array(analyserNode.frequencyBinCount);
        analyserNode.getByteTimeDomainData(data);
        let rms = 0;
        for (let i = 0; i < data.length; i++) {
          const v = (data[i] - 128) / 128;
          rms += v * v;
        }
        rms = Math.sqrt(rms / data.length) || 0;
        let volume = Math.min(1, rms * config.micSensitivity);
        if (volume < 0.02) volume = 0;
        currentVolume = volume;
      } else {
        currentVolume *= 0.95;
      }

      setParameter('ParamMouthOpenY', currentVolume, true);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  }

  function startAutoBlink() {
    if (blinkInterval) clearInterval(blinkInterval);
    blinkInterval = setInterval(() => {
      if (!model) return;
      setParameter('ParamEyeLOpen', 0);
      setParameter('ParamEyeROpen', 0);
      setTimeout(() => {
        setParameter('ParamEyeLOpen', 1);
        setParameter('ParamEyeROpen', 1);
      }, 120);
    }, config.blinkIntervalMs);
  }

  // ======================== DRAG WINDOW ========================
  function makeDraggable() {
    const container = document.getElementById('viewerDrag');
    let offsetX = 0, offsetY = 0, isDragging = false;
    let activePointerId = null;

    const startDrag = (clientX, clientY, pointerId) => {
      isDragging = true;
      activePointerId = pointerId ?? null;

      const rect = container.getBoundingClientRect();
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;
      container.style.cursor = 'grabbing';
      container.style.transition = 'none';
    };

    const moveDrag = (clientX, clientY) => {
      if (!isDragging) return;
      let left = clientX - offsetX;
      let top = clientY - offsetY;

      const maxLeft = window.innerWidth - container.offsetWidth - 10;
      const maxTop = window.innerHeight - container.offsetHeight - 10;

      left = Math.min(maxLeft, Math.max(10, left));
      top = Math.min(maxTop, Math.max(10, top));

      container.style.left = left + 'px';
      container.style.top = top + 'px';
      container.style.right = 'auto';
      container.style.bottom = 'auto';
      container.style.transform = 'none';
    };

    const endDrag = () => {
      isDragging = false;
      activePointerId = null;
      container.style.cursor = 'grab';
      container.style.transition = 'box-shadow 0.2s';
    };

    container.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;
      container.setPointerCapture(e.pointerId);
      startDrag(e.clientX, e.clientY, e.pointerId);
      e.preventDefault();
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      if (activePointerId !== null && e.pointerId !== activePointerId) return;
      moveDrag(e.clientX, e.clientY);
    });

    window.addEventListener('pointerup', () => endDrag());
    window.addEventListener('pointercancel', () => endDrag());
  }

  // ======================== MODAL UI ========================
  function showModal(content) {
    const modalDiv = document.getElementById('modalContainer');
    modalDiv.innerHTML = `<div class="modal-card">${content}</div>`;
    modalDiv.classList.remove('hidden');
    modalDiv.onclick = (e) => { if (e.target === modalDiv) modalDiv.classList.add('hidden'); };
  }

  function showProfile() {
    showModal(`
      <h3 class="text-xl font-bold mb-2">Profil</h3>
      <p>Asisten Virtual Live2D - Lumine</p>
      <p class="text-sm text-muted mt-2">Versi 2.0 | Ethereal Curator</p>
      <button class="mt-4 bg-primary text-white px-4 py-2 rounded-full" onclick="document.getElementById('modalContainer').classList.add('hidden')">Tutup</button>
    `);
  }

  function showSettings() {
    showModal(`
      <h3 class="text-xl font-bold mb-3">Pengaturan</h3>
      <label class="block mb-2">Sensitivitas Mic: <input type="range" id="micSens" min="1" max="6" step="0.1" value="${config.micSensitivity}" class="w-full"></label>
      <label class="block mb-2">Interval Kedip (ms): <input type="number" id="blinkInterval" value="${config.blinkIntervalMs}" class="border rounded p-1 w-full"></label>
      <label class="block mb-2"><input type="checkbox" id="mouseFollow" ${config.mouseFollow ? 'checked' : ''}> Ikuti Mouse</label>
      <button id="saveSettingsBtn" class="bg-primary text-white px-4 py-2 rounded-full mt-2">Simpan</button>
    `);
    document.getElementById('saveSettingsBtn').onclick = () => {
      config.micSensitivity = parseFloat(document.getElementById('micSens').value);
      config.blinkIntervalMs = parseInt(document.getElementById('blinkInterval').value);
      config.mouseFollow = document.getElementById('mouseFollow').checked;
      startAutoBlink();
      document.getElementById('modalContainer').classList.add('hidden');
    };
  }

  function showModelsPanel() {
    showModal(`
      <h3 class="text-xl font-bold mb-2">Model</h3>
      <p>Model saat ini: Lumine</p>
      <button id="uploadModelBtn" class="bg-primary text-white px-4 py-2 rounded-full mt-2">Upload Folder Model Baru</button>
      <p class="text-xs text-muted mt-2">*Upload folder yang berisi .model3.json, .moc3, texture, motion, dll.</p>
    `);
    document.getElementById('uploadModelBtn').onclick = async () => {
      try {
        const modelPath = await uploadModelFolder();
        await loadModelFromDB(modelPath);
        document.getElementById('modalContainer').classList.add('hidden');
        alert('Model berhasil dimuat!');
      } catch (e) {
        alert('Gagal upload: ' + e.message);
      }
    };
  }

  function showMotionsPanel() {
    if (motionList.length === 0) {
      showModal(`<h3 class="text-xl font-bold">Motion</h3><p>Belum ada motion tersedia. Upload folder model yang berisi motion.</p><button onclick="document.getElementById('modalContainer').classList.add('hidden')" class="mt-2 bg-primary text-white px-4 py-2 rounded-full">Tutup</button>`);
      return;
    }

    let listHtml = '<h3 class="text-xl font-bold mb-2">Pilih Motion</h3><div class="max-h-60 overflow-y-auto">';
    motionList.forEach(m => {
      listHtml += `<button class="motion-item block w-full text-left p-2 hover:bg-gray-100 rounded" data-path="${m}">${m.split('/').pop()}</button>`;
    });
    listHtml += '</div>';
    showModal(listHtml);
    document.querySelectorAll('.motion-item').forEach(btn => {
      btn.onclick = () => {
        playMotion(btn.dataset.path);
        document.getElementById('modalContainer').classList.add('hidden');
      };
    });
  }

  function showMoodPanel() {
    showModal(`
      <h3 class="text-xl font-bold mb-2">Ekspresi / Mood</h3>
      <div class="grid grid-cols-2 gap-2">
        <button data-exp="none" class="bg-gray-100 p-2 rounded">😐 Normal</button>
        <button data-exp="angry" class="bg-gray-100 p-2 rounded">😠 Marah</button>
        <button data-exp="sad" class="bg-gray-100 p-2 rounded">😢 Sedih</button>
        <button data-exp="heart" class="bg-gray-100 p-2 rounded">😍 Hati</button>
        <button data-exp="blush" class="bg-gray-100 p-2 rounded">😊 Blush</button>
      </div>
    `);
    document.querySelectorAll('[data-exp]').forEach(btn => {
      btn.onclick = () => {
        setExpression(btn.dataset.exp);
        document.getElementById('modalContainer').classList.add('hidden');
      };
    });
  }

  function showConfigPanel() {
    showSettings();
  }

  function resizeCanvasForViewport() {
    const canvas = document.getElementById('live2dCanvas');
    if (!canvas) return;

    const mobile = window.innerWidth <= 768;
    if (mobile) {
      canvas.style.width = '100%';
      canvas.style.height = 'auto';
    } else {
      canvas.style.width = '450px';
      canvas.style.height = '550px';
    }
  }

  // ======================== INIT ========================
  (async function init() {
    resizeCanvasForViewport();

    app = new PIXI.Application({
      view: document.getElementById('live2dCanvas'),
      width: 450,
      height: 550,
      backgroundColor: 0xf9fbfd,
      antialias: true,
      autoDensity: true,
      resolution: window.devicePixelRatio || 1
    });

    makeDraggable();
    startAnimationLoop();
    startAutoBlink();

    await openDB();
    const savedModelPath = await getMetadata('currentModelPath');

    if (savedModelPath) {
      await loadModelFromDB(savedModelPath);
    } else {
      alert('Selamat datang! Silakan upload folder model Live2D untuk memulai.');
      try {
        const modelPath = await uploadModelFolder();
        await loadModelFromDB(modelPath);
      } catch (e) {
        alert('Gagal upload model. Pastikan folder berisi file .model3.json');
      }
    }

    document.getElementById('micBtn').onclick = () => isMicActive ? closeMicrophone() : initMicrophone();
    document.getElementById('resetBtn').onclick = () => {
      targetAngleX = targetAngleY = 0;
      currentAngleX = currentAngleY = 0;
      setParameter('ParamAngleX', 0);
      setParameter('ParamAngleY', 0);
    };
    document.getElementById('expressionBtn').onclick = () => showMoodPanel();
    document.getElementById('configBtn').onclick = () => showConfigPanel();
    document.getElementById('profileBtn').onclick = () => showProfile();
    document.getElementById('settingsHeaderBtn').onclick = () => showSettings();

    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.onclick = () => {
        const nav = btn.dataset.nav;
        if (nav === 'models') showModelsPanel();
        else if (nav === 'motions') showMotionsPanel();
        else if (nav === 'mood') showMoodPanel();
        else if (nav === 'config') showConfigPanel();
      };
    });

    document.addEventListener('mousemove', (e) => {
      if (!config.mouseFollow) return;
      const canvasRect = document.getElementById('live2dCanvas').getBoundingClientRect();
      const centerX = canvasRect.left + canvasRect.width / 2;
      const centerY = canvasRect.top + canvasRect.height / 2;
      let dx = (e.clientX - centerX) / (canvasRect.width / 2);
      let dy = (e.clientY - centerY) / (canvasRect.height / 2);
      dx = Math.min(0.8, Math.max(-0.8, dx));
      dy = Math.min(0.8, Math.max(-0.8, dy));
      targetAngleX = dx * 25;
      targetAngleY = dy * 20;
    });

    window.addEventListener('resize', resizeCanvasForViewport);
  })();
</script></body>
</html>
